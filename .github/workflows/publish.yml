name: Publish to PyPI

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      # Required for Trusted Publishing (OIDC)
      id-token: write
      # Required for creating GitHub Releases
      contents: write

    defaults:
      run:
        working-directory: lib

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep '^version =' pyproject.toml | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: check_version
        run: |
          PACKAGE_NAME=$(grep '^name =' pyproject.toml | cut -d '"' -f 2)
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${PACKAGE_NAME}/${VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "Version ${VERSION} already exists on PyPI, skipping publish."
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "Version ${VERSION} not found on PyPI, proceeding with publish."
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check_version.outputs.EXISTS == 'false'
        run: uv build

      - name: Publish package
        if: steps.check_version.outputs.EXISTS == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: lib/dist

      - name: Create GitHub Release
        if: steps.check_version.outputs.EXISTS == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.get_version.outputs.VERSION }}" \
            --title "Release v${{ steps.get_version.outputs.VERSION }}" \
            --generate-notes \
            dist/*
